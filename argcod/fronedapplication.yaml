apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-app
  namespace: argocd
spec:
  project: inventory
  source:
    repoURL: https://github.com/your-org/inventory-platform.git
    targetRevision: main
    path: helm/frontend
  destination:
    - server: https://kubernetes.default.svc
      namespace: inventory
    - namespace: argocd   # 👈 add this
      server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
