apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inventory-bootstrap
  namespace: argocd
spec:
  project: inventory

  source:
    repoURL: https://github.com/aimlcloud/inventory-platform.git
    targetRevision: main
    path: argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: inventory

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
